name: Golden regression

on:
  schedule:
    - cron: '0 4 * * *'   # nightly 04:00 UTC
  pull_request:
    paths:
      - 'backend/agents/**'
      - 'backend/prompts/**'
      - 'backend/services/finance_engine.py'
      - 'backend/services/sanitization.py'
      - 'backend/services/legal_template_service.py'
      - 'backend/models/agent_schemas.py'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  golden:
    name: Run 50 golden ideas through mocked pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install --require-hashes -r backend/requirements.txt

      - name: Run golden suite (mocked Gemini)
        env:
          ENV: test
          GOLDEN_MAX_BUDGET_USD: "1.00"   # per-run cap; PR fails if avg > $0.85
          GOLDEN_MIN_COHERENCE: "0.60"    # avg coherence floor
        run: |
          cd backend
          pytest tests/golden -q --tb=short --json-report --json-report-file=golden-report.json

      - uses: actions/upload-artifact@v7
        if: always()
        with: { name: golden-report, path: backend/golden-report.json, retention-days: 14 }

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('backend/golden-report.json', 'utf8'));
            const summary = report.summary || {};
            const passed = summary.passed || 0;
            const failed = summary.failed || 0;
            const total = passed + failed;
            const passRate = total ? ((passed/total)*100).toFixed(1) : 'n/a';
            const avgCoherence = (report.metrics && report.metrics.avg_coherence_score) || 'n/a';
            const avgCost = (report.metrics && report.metrics.avg_cost_usd) || 'n/a';
            const body = `## Golden regression report

            | Metric | Value |
            |---|---|
            | Pass rate | ${passRate}% (${passed}/${total}) |
            | Avg coherence score | ${avgCoherence} |
            | Avg cost / run | $${avgCost} |

            See artifact \`golden-report\` for the full JSON.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Open issue on nightly failure
        if: github.event_name == 'schedule' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[golden-regression] nightly failed on ${new Date().toISOString().slice(0,10)}`,
              labels: ['regression', 'pipeline'],
              body: `Golden regression nightly failed. Check workflow run: ${context.runId}`
            });
