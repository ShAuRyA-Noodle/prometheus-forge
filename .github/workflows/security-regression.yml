name: Security regression

on:
  schedule:
    - cron: '0 5 * * *'   # nightly 05:00 UTC
  pull_request:
    paths:
      - 'backend/services/sanitization.py'
      - 'backend/services/vertex_safety.py'
      - 'backend/services/legal_template_service.py'
      - 'backend/middleware/**'
      - 'backend/agents/gates.py'
      - 'backend/api/**'
      - 'backend/tests/security/**'
      - 'backend/tests/abuse/**'
      - 'backend/tests/chaos/**'
      - 'backend/tests/fuzz/**'
      - 'frontend/src/lib/purify.ts'
      - 'frontend/src/components/Sandbox/**'
      - 'infrastructure/firestore.rules'
      - 'infrastructure/cloud-armor-rules.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  security:
    name: Run security + abuse + chaos suites
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install --require-hashes -r backend/requirements.txt

      - name: Run unit security tests
        run: |
          cd backend
          pytest tests/security -q --tb=short

      - name: Run abuse tests
        run: |
          cd backend
          pytest tests/abuse -q --tb=short

      - name: Run chaos tests
        env:
          RUN_CHAOS: "1"
        run: |
          cd backend
          pytest tests/chaos -q --tb=short

      - name: Run fuzz tests (smoke profile)
        env:
          RUN_FUZZ: "1"
          HYPOTHESIS_PROFILE: "ci"
        run: |
          cd backend
          pytest tests/fuzz -q --tb=short

      - name: Open issue on nightly failure
        if: github.event_name == 'schedule' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[security-regression] nightly failed on ${new Date().toISOString().slice(0,10)}`,
              labels: ['security', 'regression'],
              body: `Security regression nightly failed. Workflow run: ${context.runId}`
            });
