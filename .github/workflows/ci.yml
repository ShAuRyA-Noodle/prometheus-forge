name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint-backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: ruff format check
        run: ruff format --check backend
      - name: ruff lint
        run: ruff check backend

  typecheck-backend:
    name: Typecheck backend (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: mypy --strict
        run: mypy --strict backend/agents backend/services backend/models

  test-backend:
    name: Test backend (pytest, coverage gate 70%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: pytest with coverage
        run: |
          cd backend
          pytest --cov=. --cov-branch --cov-report=xml --cov-report=term --cov-fail-under=70 -q
        env:
          ENV: test
          PYTHONUNBUFFERED: "1"
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  lint-frontend:
    name: Lint frontend (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run format:check

  typecheck-frontend:
    name: Typecheck frontend (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run typecheck

  test-frontend:
    name: Test frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run test:ci

  audit-dependencies:
    name: Audit dependencies (pip-audit + npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --strict
      - name: npm audit
        run: |
          cd frontend
          npm audit --audit-level=high

  pre-commit-hooks:
    name: Pre-commit hooks (gitleaks + custom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: No service-account.json paths
        run: |
          if grep -RIn "service-account.json" backend/Dockerfile* infrastructure/ 2>/dev/null; then
            echo "Found service-account.json reference in Docker layer or infra"; exit 1
          fi
      - name: No raw HTML in agent outputs without nh3
        run: |
          if grep -RIn "html_raw\|return.*<\(script\|iframe\)" backend/agents/ 2>/dev/null; then
            echo "Found raw HTML in agent code"; exit 1
          fi
      - name: No idea_text in logs
        run: |
          if grep -RIn 'logger.*idea_text[^_]' backend/ 2>/dev/null; then
            echo "Found idea_text in log statement (use idea_text_hash)"; exit 1
          fi

  prompt-registry-gate:
    name: Prompt registry gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify PROMPT_REGISTRY.md updated when prompts change
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PROMPT_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'backend/prompts/*' || true)
          REGISTRY_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'docs/PROMPT_REGISTRY.md' || true)
          if [[ -n "$PROMPT_CHANGED" && -z "$REGISTRY_CHANGED" ]]; then
            echo "Prompt files changed but docs/PROMPT_REGISTRY.md was not updated."
            echo "Changed prompts:"; echo "$PROMPT_CHANGED"
            exit 1
          fi

  architecture-doc-gate:
    name: Architecture doc gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify ARCHITECTURE.md updated when topology changes
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          TOPO_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'backend/agents/orchestrator.py' 'backend/agents/gates.py' 'backend/api/' || true)
          DOC_CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- 'docs/ARCHITECTURE.md' || true)
          if [[ -n "$TOPO_CHANGED" && -z "$DOC_CHANGED" ]]; then
            echo "Topology files changed but docs/ARCHITECTURE.md was not updated."
            echo "Changed topology files:"; echo "$TOPO_CHANGED"
            exit 1
          fi
