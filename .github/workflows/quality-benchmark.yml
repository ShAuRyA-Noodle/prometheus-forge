name: Quality benchmark

on:
  schedule:
    - cron: '0 7 * * 1'   # weekly Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  judge:
    name: Judge service score regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install --require-hashes -r backend/requirements.txt

      - name: Run judge against last week's prod outputs (anonymized)
        env:
          ENV: bench
          # Reads anonymized prod sample from GCS via Workload Identity
        run: |
          cd backend
          python -m services.judge_service --bench --output=judge-report.json

      - uses: actions/upload-artifact@v4
        with: { name: judge-report, path: backend/judge-report.json, retention-days: 60 }

      - name: Score gate (≥0.74 avg coherence)
        run: |
          set -euo pipefail
          cd backend
          AVG=$(python -c "import json; r=json.load(open('judge-report.json')); print(r['avg_coherence_score'])")
          echo "Average coherence: $AVG"
          python -c "import sys; sys.exit(0 if float('$AVG') >= 0.74 else 1)"

      - name: Open issue on score regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[quality] avg coherence dropped below 0.74 on ${new Date().toISOString().slice(0,10)}`,
              labels: ['quality', 'regression', 'prompt'],
              body: `Weekly quality benchmark failed. Workflow run: ${context.runId}`
            });
