name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  PROJECT_ID_STAGING: prometheus-staging
  PROJECT_ID_PROD: prometheus-prod
  REGION: us-central1
  WIF_PROVIDER: projects/${{ secrets.GCP_PROJECT_NUMBER_STAGING }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_PROVIDER_PROD: projects/${{ secrets.GCP_PROJECT_NUMBER_PROD }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  build-and-push:
    name: Build + push images (cosign-signed)
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.short-sha.outputs.value }}
    steps:
      - uses: actions/checkout@v7

      - id: short-sha
        run: echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP (staging — used for build)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ci-deploy-sa@${{ env.PROJECT_ID_STAGING }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build gateway image
        run: |
          docker build -f backend/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/gateway:${{ steps.short-sha.outputs.value }} \
            backend
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/gateway:${{ steps.short-sha.outputs.value }}

      - name: Build worker image
        run: |
          docker build -f backend/Dockerfile.worker \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/worker:${{ steps.short-sha.outputs.value }} \
            backend
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/worker:${{ steps.short-sha.outputs.value }}

      - name: Trivy scan (HIGH/CRITICAL fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/gateway:${{ steps.short-sha.outputs.value }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Cosign sign images (KMS-backed key)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          cosign sign --key gcpkms://projects/${{ env.PROJECT_ID_STAGING }}/locations/global/keyRings/cosign/cryptoKeys/signer/cryptoKeyVersions/1 \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/gateway:${{ steps.short-sha.outputs.value }}
          cosign sign --key gcpkms://projects/${{ env.PROJECT_ID_STAGING }}/locations/global/keyRings/cosign/cryptoKeys/signer/cryptoKeyVersions/1 \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/worker:${{ steps.short-sha.outputs.value }}

  deploy-staging:
    name: Deploy staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to GCP (staging)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ci-deploy-sa@${{ env.PROJECT_ID_STAGING }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy gateway
        run: |
          gcloud run deploy prometheus-gateway \
            --project=${{ env.PROJECT_ID_STAGING }} \
            --region=${{ env.REGION }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/gateway:${{ needs.build-and-push.outputs.sha }} \
            --service-account=gateway-sa@${{ env.PROJECT_ID_STAGING }}.iam.gserviceaccount.com \
            --min-instances=1 --max-instances=10 --concurrency=80 \
            --memory=1Gi --cpu=2 --timeout=300 \
            --ingress=internal-and-cloud-load-balancing \
            --no-allow-unauthenticated

      - name: Deploy worker
        run: |
          gcloud run deploy prometheus-worker \
            --project=${{ env.PROJECT_ID_STAGING }} \
            --region=${{ env.REGION }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/worker:${{ needs.build-and-push.outputs.sha }} \
            --service-account=worker-sa@${{ env.PROJECT_ID_STAGING }}.iam.gserviceaccount.com \
            --min-instances=0 --max-instances=20 --concurrency=4 \
            --memory=4Gi --cpu=4 --no-cpu-throttling --timeout=900 \
            --ingress=internal --no-allow-unauthenticated

      - name: Apply Firestore rules + indexes (staging)
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:rules,firestore:indexes --project=${{ env.PROJECT_ID_STAGING }} --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Smoke test — health
        run: |
          curl -fsS "https://staging.prometheus.app/healthz"
          curl -fsS "https://staging.prometheus.app/readyz"

      - name: Smoke test — golden idea round-trip
        env:
          STAGING_TEST_JWT: ${{ secrets.STAGING_TEST_JWT }}
        run: bash scripts/smoke-golden.sh staging

  deploy-prod:
    name: Deploy prod (manual approval)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to GCP (prod)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_PROD }}
          service_account: ci-deploy-sa@${{ env.PROJECT_ID_PROD }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Promote staging image SHA to prod
        run: |
          gcloud container images add-tag \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/gateway:${{ needs.build-and-push.outputs.sha }} \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_PROD }}/containers/gateway:${{ needs.build-and-push.outputs.sha }} \
            --quiet
          gcloud container images add-tag \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_STAGING }}/containers/worker:${{ needs.build-and-push.outputs.sha }} \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_PROD }}/containers/worker:${{ needs.build-and-push.outputs.sha }} \
            --quiet

      - name: Canary deploy (10%) — gateway
        run: |
          gcloud run deploy prometheus-gateway \
            --project=${{ env.PROJECT_ID_PROD }} \
            --region=${{ env.REGION }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_PROD }}/containers/gateway:${{ needs.build-and-push.outputs.sha }} \
            --service-account=gateway-sa@${{ env.PROJECT_ID_PROD }}.iam.gserviceaccount.com \
            --no-traffic --tag=canary
          gcloud run services update-traffic prometheus-gateway \
            --to-tags=canary=10 \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID_PROD }}

      - name: Observe canary 10 minutes
        run: sleep 600

      - name: Promote to 100%
        run: |
          gcloud run services update-traffic prometheus-gateway \
            --to-tags=canary=100 \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID_PROD }}

      - name: Deploy worker (full rollout — internal-only, no canary)
        run: |
          gcloud run deploy prometheus-worker \
            --project=${{ env.PROJECT_ID_PROD }} \
            --region=${{ env.REGION }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID_PROD }}/containers/worker:${{ needs.build-and-push.outputs.sha }}

      - name: Apply Firestore rules + indexes (prod)
        run: |
          npm install -g firebase-tools
          firebase deploy --only firestore:rules,firestore:indexes --project=${{ env.PROJECT_ID_PROD }} --token "${{ secrets.FIREBASE_TOKEN_PROD }}"

      - name: Frontend Firebase Hosting
        run: |
          cd frontend
          npm ci
          npm run build
          firebase deploy --only hosting --project=${{ env.PROJECT_ID_PROD }} --token "${{ secrets.FIREBASE_TOKEN_PROD }}"

      - name: Smoke test prod
        run: |
          curl -fsS "https://prometheus.app/healthz"
          curl -fsS "https://prometheus.app/readyz"

      - name: Tag release
        run: |
          git tag "deploy/$(date -u +%Y%m%d-%H%M)-${{ needs.build-and-push.outputs.sha }}"
          git push --tags
