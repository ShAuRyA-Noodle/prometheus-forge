# PROMETHEUS V2 — Cloud Run worker service
# Role: executes the actual agent pipeline. Invoked by Cloud Tasks ONLY.
# Concurrency=1 means each instance runs at most one pipeline at a time —
# this keeps memory/cost predictable and avoids one slow run blocking another.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: prometheus-worker
  labels:
    cloud.googleapis.com/location: us-central1
    app: prometheus
    component: worker
    env: prod
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: internal               # Cloud Tasks reaches via VPC
    run.googleapis.com/description: "PROMETHEUS V2 pipeline worker. Cloud Tasks-only invocation."

spec:
  template:
    metadata:
      labels:
        app: prometheus
        component: worker
      annotations:
        # ---- Resources ----
        run.googleapis.com/cpu-throttling: "true"          # request-only billing
        run.googleapis.com/startup-cpu-boost: "true"
        autoscaling.knative.dev/minScale: "0"              # scale to zero when idle
        autoscaling.knative.dev/maxScale: "20"

        # ---- Workload Identity SA ----
        run.googleapis.com/service-account: "worker-sa@prometheus-prod.iam.gserviceaccount.com"

        # ---- Networking ----
        run.googleapis.com/vpc-access-connector: "projects/prometheus-prod/locations/us-central1/connectors/prometheus-vpc"
        run.googleapis.com/vpc-access-egress: "private-ranges-only"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 1                              # one pipeline per instance
      timeoutSeconds: 300                                  # 5 min ceiling per request (pipeline ~120s p95)
      serviceAccountName: worker-sa@prometheus-prod.iam.gserviceaccount.com

      containers:
        - name: worker
          image: us-central1-docker.pkg.dev/prometheus-prod/prometheus/backend:latest
          command: ["uvicorn"]
          args:
            - "workers.worker_app:app"
            - "--host=0.0.0.0"
            - "--port=8080"
            - "--workers=1"
            - "--no-access-log"
          ports:
            - name: http1
              containerPort: 8080

          # ---- Resource budget (4 vCPU / 2 GiB — agents need headroom) ----
          resources:
            limits:
              cpu: "4"
              memory: "2Gi"

          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 2
            failureThreshold: 30

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            timeoutSeconds: 1
            periodSeconds: 30
            failureThreshold: 3

          env:
            - name: ENV
              value: prod
            - name: LOG_LEVEL
              value: INFO
            - name: ROLE
              value: worker
            - name: GOOGLE_CLOUD_PROJECT
              value: prometheus-prod
            - name: GOOGLE_CLOUD_REGION
              value: us-central1
            - name: VERTEX_AI_LOCATION
              value: us-central1
            - name: VERTEX_SAFETY_ENABLED
              value: "true"
            - name: FIRESTORE_DATABASE
              value: "(default)"
            - name: FIREBASE_PROJECT_ID
              value: prometheus-prod
            - name: IMAGEN_LOCATION
              value: us-central1
            - name: MAX_TOKENS_PER_SESSION
              value: "120000"
            - name: MAX_COST_USD_PER_SESSION
              value: "2.50"

            # ---- Secrets ----
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            - name: DEEPGRAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: DEEPGRAM_API_KEY
                  key: latest
            - name: USPTO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: USPTO_API_KEY
                  key: latest
            - name: DOMAINR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: DOMAINR_API_KEY
                  key: latest
            - name: CRUNCHBASE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: CRUNCHBASE_API_KEY
                  key: latest
            - name: STATISTA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: STATISTA_API_KEY
                  key: latest
            - name: SIMILARWEB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: SIMILARWEB_API_KEY
                  key: latest
            - name: RECRAFT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: RECRAFT_API_KEY
                  key: latest
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: CLOUDFLARE_API_TOKEN
                  key: latest
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: RESEND_API_KEY
                  key: latest

  traffic:
    - latestRevision: true
      percent: 100
