# PROMETHEUS V2 — Cloud Run gateway service
# Role: synchronous HTTP edge. Auth, validation, idempotency, enqueue Cloud Task.
# NEVER runs the agent pipeline itself — always offloads to /workers via Cloud Tasks.
#
# Deploy:
#   gcloud run services replace infrastructure/cloud-run-gateway.yaml \
#     --region=us-central1 --project=prometheus-prod

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: prometheus-gateway
  labels:
    cloud.googleapis.com/location: us-central1
    app: prometheus
    component: gateway
    env: prod
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
    run.googleapis.com/description: "PROMETHEUS V2 API gateway. Validates, queues. Never runs agents."

spec:
  template:
    metadata:
      labels:
        app: prometheus
        component: gateway
      annotations:
        # ---- Resources ----
        run.googleapis.com/cpu-throttling: "false"        # always-on CPU for SSE streams
        run.googleapis.com/startup-cpu-boost: "true"
        autoscaling.knative.dev/minScale: "1"             # always warm
        autoscaling.knative.dev/maxScale: "10"

        # ---- Workload Identity SA ----
        run.googleapis.com/service-account: "gateway-sa@prometheus-prod.iam.gserviceaccount.com"

        # ---- Networking ----
        run.googleapis.com/vpc-access-connector: "projects/prometheus-prod/locations/us-central1/connectors/prometheus-vpc"
        run.googleapis.com/vpc-access-egress: "private-ranges-only"

        # ---- Execution env (gen2 for better perf, larger /tmp) ----
        run.googleapis.com/execution-environment: gen2

        # ---- Sessions (for SSE) ----
        run.googleapis.com/sessionAffinity: "true"
    spec:
      containerConcurrency: 10                            # 10 concurrent requests per instance (SSE-friendly)
      timeoutSeconds: 60                                  # gateway is sync; pipeline runs separately
      serviceAccountName: gateway-sa@prometheus-prod.iam.gserviceaccount.com

      containers:
        - name: gateway
          image: us-central1-docker.pkg.dev/prometheus-prod/prometheus/backend:latest
          command: ["uvicorn"]
          args:
            - "main:app"
            - "--host=0.0.0.0"
            - "--port=8080"
            - "--workers=2"
            - "--no-access-log"                           # we log through structlog
            - "--proxy-headers"
            - "--forwarded-allow-ips=*"
          ports:
            - name: http1
              containerPort: 8080

          # ---- Resource budget ----
          resources:
            limits:
              cpu: "2"
              memory: "1Gi"

          # ---- Startup probe: 30s grace ----
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 1
            periodSeconds: 2
            failureThreshold: 15

          # ---- Liveness ----
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            timeoutSeconds: 1
            periodSeconds: 30
            failureThreshold: 3

          # ---- Env from Secret Manager + non-secret flags ----
          env:
            - name: ENV
              value: prod
            - name: LOG_LEVEL
              value: INFO
            - name: ROLE
              value: gateway
            - name: GOOGLE_CLOUD_PROJECT
              value: prometheus-prod
            - name: GOOGLE_CLOUD_REGION
              value: us-central1
            - name: BACKEND_URL
              value: https://api.prometheus.app
            - name: CORS_ORIGINS
              value: "https://prometheus.app,https://www.prometheus.app"
            - name: FIRESTORE_DATABASE
              value: "(default)"
            - name: FIREBASE_PROJECT_ID
              value: prometheus-prod
            - name: VERTEX_AI_LOCATION
              value: us-central1
            - name: VERTEX_SAFETY_ENABLED
              value: "true"
            - name: CLOUD_TASKS_QUEUE
              value: prometheus-pipeline
            - name: CLOUD_TASKS_LOCATION
              value: us-central1
            - name: CLOUD_TASKS_INVOKER_SA
              value: tasks-invoker@prometheus-prod.iam.gserviceaccount.com
            - name: MAX_TOKENS_PER_SESSION
              value: "120000"
            - name: MAX_COST_USD_PER_SESSION
              value: "2.50"
            - name: HOURLY_RATE_LIMIT_PER_UID
              value: "3"
            - name: DAILY_RATE_LIMIT_PER_UID
              value: "20"
            - name: INPUT_LENGTH_CAP_CHARS
              value: "2000"

            # ---- Secrets ----
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: SECRET_KEY
                  key: latest
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: STRIPE_SECRET_KEY
                  key: latest
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: STRIPE_WEBHOOK_SECRET
                  key: latest
            - name: CLOUD_TASKS_WORKER_URL
              valueFrom:
                secretKeyRef:
                  name: CLOUD_TASKS_WORKER_URL
                  key: latest
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: RESEND_API_KEY
                  key: latest

  traffic:
    - latestRevision: true
      percent: 100
